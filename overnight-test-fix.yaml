## ============================================================
## FloraIQ Overnight Test & Fix Pipeline — 130 Tasks
## ============================================================
## Run: ralphy --yaml overnight-test-fix.yaml --parallel --max-parallel 5
##
## Tests every edge function individually, all auth flows, emails,
## payments, database schema, security, and UI flows.
## Auto-fixes and deploys any issues found.
##
## Expected runtime: 4-8 hours
## ============================================================

tasks:

  # ============================================================
  # GROUP 1: Auth Edge Functions (individual tests)
