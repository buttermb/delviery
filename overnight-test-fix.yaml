  - title: "Test & fix: tenant-signup"
    parallel_group: 1
    completed: false
    description: |
      Test tenant-signup edge function end-to-end.
      1. Send: curl -s -X POST -H "Content-Type: application/json" -d '{"email":"test-signup-'$(date +%s)'@test.com","password":"TestPass123!","business_name":"Overnight Test Store","owner_name":"Test Owner"}' "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/tenant-signup"
      2. Expected: 200 with {success:true} or 400 (validation). NOT 500.
      3. If 500: read supabase/functions/tenant-signup/index.ts and all modules in that directory. Diagnose, fix, deploy with: npx supabase functions deploy tenant-signup
      4. Verify the fix by re-testing.
      5. Clean up test data: npx supabase db query --linked "DELETE FROM tenants WHERE owner_email LIKE 'test-signup-%@test.com'"

  - title: "Test & fix: tenant-admin-auth login"
    parallel_group: 1
    completed: false
