  # ============================================================
  # GROUP 14: Database & Schema Verification
  # ============================================================

  - title: "Verify all tables referenced by edge functions exist"
    parallel_group: 14
    completed: false
    description: |
      Extract all table names from edge functions:
        grep -roh "\.from(['\"][a-z_]*['\"])" supabase/functions/ | sort -u | sed "s/\.from(['\"]//;s/['\"])//"
      Cross-reference with actual database tables. Fix any mismatches.

  - title: "Verify all RPC functions referenced by edge functions exist"
    parallel_group: 14
    completed: false
    description: |
      Extract all RPC names:
        grep -roh "\.rpc(['\"][a-z_]*['\"]" supabase/functions/ | sort -u | sed "s/\.rpc(['\"]//;s/['\"]$//"
      Check each exists: npx supabase db query --linked "SELECT proname FROM pg_proc WHERE pronamespace = (SELECT oid FROM pg_namespace WHERE nspname = 'public')"
      Fix any missing.

  - title: "Verify all column references in edge functions match DB schema"
    parallel_group: 14
    completed: false
    description: |
      Spot-check 20 critical tables: tenants, tenant_users, orders, products, tenant_credits, deliveries, wholesale_orders, wholesale_payments, couriers, invoices.
      For each: compare .select() columns in the code vs actual columns in the DB.
      Fix any column name mismatches (common: owner_phone vs phone, delivery_lat vs dropoff_lat).

  - title: "Verify RLS policies allow expected operations"
    parallel_group: 14
    completed: false
    description: |
      Check critical tables have both SELECT and UPDATE policies:
        npx supabase db query --linked "SELECT tablename, policyname, cmd FROM pg_policies WHERE schemaname='public' AND tablename IN ('tenants','tenant_users','orders','products','tenant_credits','invoices','sidebar_preferences')"
      Any table with SELECT but no UPDATE policy needs one if the frontend writes to it.
      Fix by adding appropriate RLS policies.

  # ============================================================
  # GROUP 15: Rate Limiting & Security Verification
  # ============================================================

  - title: "Verify rate limiting works on validate-email"
    parallel_group: 15
    completed: false
    description: |
      Send 15 rapid requests to validate-email. After 10, should get 429.
      If all return 200: rate limiting is broken. Check the function imports checkRateLimit correctly.

  - title: "Verify rate limiting works on send-otp"
    parallel_group: 15
    completed: false
    description: |
      Send 8 rapid requests to send-otp. After 5, should get 429.

  - title: "Verify rate limiting works on request-password-reset"
    parallel_group: 15
    completed: false
    description: |
      Send 5 rapid requests. After 3, should get 429.

  - title: "Verify rate limiting works on access-encrypted-menu"
    parallel_group: 15
    completed: false
    description: |
      Send 35 rapid requests. After 30, should get 429.

  - title: "Verify no PINs or passwords in API responses"
    parallel_group: 15
    completed: false
    description: |
      Grep all edge function response bodies for 'pin' or 'password' fields being returned:
        grep -rn '"pin"' supabase/functions/ | grep -i "json\|response\|stringify" | grep -v "pin_delivered\|pin_reset\|pin_required"
      Any function returning actual PIN values: CRITICAL — fix immediately.

  - title: "Verify CORS preflight on all 204 functions"
    parallel_group: 15
    completed: false
    description: |
      Test OPTIONS on every function. All must return 200.
      Fix any that don't.

  # ============================================================
  # GROUP 16: Final Verification & Report
  # ============================================================

  - title: "Final full smoke test — all 204 functions"
    parallel_group: 16
    completed: false
    description: |
      Re-run the complete smoke test on all 204 functions.
      For each, send curl POST with empty body and record the status code.
      Report any remaining 500 errors.
      Generate overnight-test-report.md with:
      - Total tested, passing, failing
      - List of all fixes applied during this run
      - Known issues requiring manual intervention
      - Recommendations

  - title: "Commit all fixes, deploy, and push final report"
    parallel_group: 16
    completed: false
    description: |
      1. git add all modified files
      2. git commit -m "fix: overnight automated test & fix run — $(date +%Y-%m-%d)"
      3. npx supabase functions deploy (all functions)
      4. git push
      5. Generate tasks/overnight-test-report.md with full results
      6. git add tasks/overnight-test-report.md && git commit -m "docs: overnight test report" && git push
