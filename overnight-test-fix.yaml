## FloraIQ Overnight Test & Fix Pipeline
## Run: ralphy --yaml overnight-test-fix.yaml --parallel --max-parallel 3
##
## What this does:
## 1. Smoke tests ALL 200+ edge functions for 500 errors
## 2. Tests critical UI flows (signup, login, dashboard, POS, ordering)
## 3. Tests email sending (verification, welcome, password reset)
## 4. Tests payment flows (Stripe Connect, checkout)
## 5. Tests loyalty/wallet features
## 6. For EVERY failure: diagnose root cause, fix the code, deploy the fix, verify it works
##
## Expected runtime: 2-4 hours depending on how many issues found

tasks:
  # ============================================================
  # GROUP 1: Edge Function Smoke Tests (parallel)
  # ============================================================

  - title: "Smoke test all edge functions for 500 errors and fix any crashes"
    parallel_group: 1
    completed: false
    description: |
      Test every edge function by sending a minimal POST request with empty body {}.

      1. Get the full list of functions:
         ls supabase/functions/*/index.ts | sed 's|.*/functions/||;s|/index.ts||' | grep -v _shared | grep -v __tests__ | sort

      2. For each function, run:
         curl -s -o /dev/null -w "%{http_code}" -m 10 -X POST -H "Content-Type: application/json" -d '{}' "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/<function-name>"

      3. Expected results:
         - 200 = working (cron jobs, health checks)
         - 400 = working (validation error, missing fields — correct behavior)
         - 401 = working (auth required — correct behavior)
         - 404 = function not deployed or wrong name
         - 429 = rate limited (OK, means rate limiting works)
         - 500 = BUG — needs fixing

      4. For every function returning 500:
         a. Read the function code
         b. Get the actual error: curl -s the full response body
         c. Diagnose the root cause (missing column, bad import, null dereference, etc.)
         d. Fix the code
         e. Deploy: npx supabase functions deploy <function-name>
         f. Re-test to verify the fix works

      5. Common 500 causes to check:
         - req.headers.get("Authorization")! — crashes if no auth header (remove the !)
         - .from('table_that_doesnt_exist') — check table exists in DB
         - .select('column_that_doesnt_exist') — check column exists
         - import from wrong path after refactoring
         - Deno.env.get() returning undefined for required vars

      6. After fixing, commit: git add <files> && git commit -m "fix: resolve 500 errors found in overnight smoke test"

      IMPORTANT: Do NOT change business logic. Only fix crashes and deployment issues.

  - title: "Verify all CORS preflight OPTIONS requests return 200"
    parallel_group: 1
    completed: false
    description: |
      Test CORS preflight on every edge function.

      1. For each function, send an OPTIONS request:
         curl -s -o /dev/null -w "%{http_code}" -X OPTIONS \
           -H "Origin: https://floraiqcrm.com" \
           -H "Access-Control-Request-Method: POST" \
           -H "Access-Control-Request-Headers: authorization,content-type" \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/<function-name>"

      2. Every function MUST return 200 for OPTIONS.

      3. If any return non-200:
         a. Read the function code
         b. Check if it handles OPTIONS: look for req.method === 'OPTIONS'
         c. Check if withZenProtection middleware is blocking it
         d. Fix and deploy

      4. Also verify the response includes proper CORS headers:
         curl -s -I -X OPTIONS -H "Origin: https://floraiqcrm.com" "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/<function-name>"
         Must include: Access-Control-Allow-Origin, Access-Control-Allow-Headers

  - title: "Verify config.toml matches all function directories"
    parallel_group: 1
    completed: false
    description: |
      Cross-reference supabase/config.toml with actual function directories.

      1. List all function directories:
         ls -d supabase/functions/*/index.ts | sed 's|.*/functions/||;s|/index.ts||' | grep -v _shared | grep -v __tests__ | sort > /tmp/fn_dirs.txt

      2. Extract functions from config.toml:
         grep '^\[functions\.' supabase/config.toml | sed 's/\[functions\.//;s/\]//' | sort > /tmp/fn_config.txt

      3. Find functions missing from config.toml:
         comm -23 /tmp/fn_dirs.txt /tmp/fn_config.txt

      4. For each missing function:
         a. Read the function code to determine if it needs auth or not
         b. Add it to config.toml with correct verify_jwt setting
         c. Public endpoints (webhooks, auth login/signup, menus): verify_jwt = false
         d. Protected endpoints (admin, billing, user data): verify_jwt = true

      5. Deploy to apply config changes: npx supabase functions deploy <function-names>

  # ============================================================
  # GROUP 2: Auth Flow Tests (after smoke tests pass)
  # ============================================================

  - title: "Test tenant signup flow end-to-end and fix any issues"
    parallel_group: 2
    completed: false
    description: |
      Test the complete tenant signup flow.

      1. Call tenant-signup with test data:
         curl -s -X POST -H "Content-Type: application/json" \
           -d '{
             "email": "overnight-test-'$(date +%s)'@testmail.com",
             "password": "TestPass123!",
             "business_name": "Test Deli '$(date +%s)'",
             "owner_name": "Test Owner",
             "phone": "555-0100",
             "state": "NY",
             "industry": "retail",
             "company_size": "1-5"
           }' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/tenant-signup"

      2. Expected: 200 with { success: true, tenant: {...}, user: {...}, session: {...} }

      3. If it fails:
         a. Check the error message in the response
         b. Common issues: JWT_SECRET missing, rate limiting, Zod validation
         c. Read supabase/functions/tenant-signup/index.ts and related modules
         d. Fix, deploy, re-test

      4. If signup succeeds, verify:
         a. Tenant record created in DB: npx supabase db query --linked "SELECT id, slug FROM tenants WHERE owner_email = '<email>'"
         b. Tenant user created: npx supabase db query --linked "SELECT id FROM tenant_users WHERE email = '<email>'"
         c. Credits initialized: npx supabase db query --linked "SELECT balance FROM tenant_credits WHERE tenant_id = '<tenant_id>'"

      5. Clean up test data after verification:
         npx supabase db query --linked "DELETE FROM tenants WHERE owner_email LIKE 'overnight-test-%@testmail.com'"

  - title: "Test tenant admin login flow and fix any issues"
    parallel_group: 2
    completed: false
    description: |
      Test the tenant-admin-auth login flow.

      1. Use an existing test account or the one created by signup test.
         Call tenant-admin-auth with login action:
         curl -s -X POST -H "Content-Type: application/json" \
           -d '{"action": "login", "email": "sake2608@icloud.com", "password": "<password>"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/tenant-admin-auth"

      2. Expected: 200 with session tokens and tenant data

      3. If 403: check if brute force protection is blocking (check auth_audit_log table)
      4. If 401: check credentials and tenant_users record
      5. If 500: read the error, check tenant-admin-auth/index.ts and handlers/

      6. Also test:
         - verify action (with token from login)
         - refresh action (with refresh token)
         - logout action (with session token)

      7. Fix any issues found, deploy, re-test.

  - title: "Test customer auth flow and fix any issues"
    parallel_group: 2
    completed: false
    description: |
      Test the customer-auth signup and login flow.

      1. Test customer signup:
         curl -s -X POST -H "Content-Type: application/json" \
           -d '{"action": "signup", "email": "cust-test-'$(date +%s)'@testmail.com", "password": "CustPass123!", "name": "Test Customer", "phone": "555-0200", "tenant_slug": "snak-station-inc-1774894616257"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/customer-auth"

      2. Test customer login:
         curl -s -X POST -H "Content-Type: application/json" \
           -d '{"action": "login", "email": "<email>", "password": "CustPass123!", "tenant_slug": "snak-station-inc-1774894616257"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/customer-auth"

      3. Expected: 200 with token and customer data

      4. Fix any issues, deploy, clean up test data.

  # ============================================================
  # GROUP 3: Email & Notification Tests (after auth works)
  # ============================================================

  - title: "Test all email-sending edge functions and fix any issues"
    parallel_group: 3
    completed: false
    description: |
      Test every edge function that sends emails. These need a valid auth token.

      First, get a session token by logging in:
        TOKEN=$(curl -s -X POST -H "Content-Type: application/json" \
          -d '{"action": "login", "email": "sake2608@icloud.com", "password": "<password>"}' \
          "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/tenant-admin-auth" | jq -r '.session.access_token // .token // empty')

      Then test each email function with the auth token:

      1. send-verification-email:
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"email": "sake2608@icloud.com"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/send-verification-email"

      2. resend-admin-verification:
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"email": "sake2608@icloud.com"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/resend-admin-verification"

      3. send-welcome-email:
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"email": "sake2608@icloud.com", "name": "Test", "tenant_slug": "snak-station-inc-1774894616257"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/send-welcome-email"

      4. request-password-reset:
         curl -s -X POST -H "Content-Type: application/json" \
           -d '{"email": "sake2608@icloud.com", "tenant_slug": "snak-station-inc-1774894616257"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/request-password-reset"

      5. send-invitation-email (via tenant-invite):
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"action": "send_invitation", "email": "invite-test@testmail.com", "role": "staff", "name": "Test Staff"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/tenant-invite"

      For each test:
      - Expected: 200 or 202 (email queued)
      - If 500: read the error, check RESEND_API_KEY is set in Supabase secrets, fix code
      - If 400: check request body matches expected schema
      - If 401: token expired or invalid, re-authenticate

      Fix any issues, deploy, re-test.

      NOTE: These send REAL emails. Use test email addresses only.

  - title: "Test push notification and SMS edge functions"
    parallel_group: 3
    completed: false
    description: |
      Test notification functions (these may fail gracefully if Twilio/FCM not configured — that's OK).

      1. send-notification:
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"type": "test", "message": "Overnight test notification"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/send-notification"

      2. send-sms:
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"to": "+15550000000", "message": "Test SMS"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/send-sms"

      3. send-push-notification:
         curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
           -d '{"title": "Test", "body": "Overnight test push"}' \
           "https://mtvwmyerntkhrcdnhahp.supabase.co/functions/v1/send-push-notification"

      Expected: 200 (sent), 200 with "skipped" (service not configured), or 400 (missing params)
      NOT expected: 500 (crash)

      If 500: fix the crash. If service not configured, ensure it fails gracefully with a clear message.

