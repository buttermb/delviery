  - title: "Verify all tables referenced by edge functions exist in the database"
    parallel_group: 10
    completed: false
    description: |
      Cross-reference every table name used in edge functions against the actual database schema.

      1. Extract all table names from edge functions:
         grep -roh "\.from(['\"][a-z_]*['\"])" supabase/functions/ | sort -u | sed "s/\.from(['\"]//;s/['\"])//" > /tmp/fn_tables.txt

      2. Get actual tables from database:
         npx supabase db query --linked "SELECT table_name FROM information_schema.tables WHERE table_schema='public' ORDER BY table_name"

      3. Find tables referenced in code but not in DB:
         Compare the two lists

      4. For each missing table:
         a. Check if it's a typo (e.g., 'super_admins' vs 'super_admin_users')
         b. If typo: fix the code reference
         c. If legitimately missing: create the table with appropriate schema
         d. Run: NOTIFY pgrst, 'reload schema'

      5. Also check for missing columns:
         grep -roh "\.select(['\"][a-z_, ]*['\"])" supabase/functions/ — spot-check critical queries

      6. Fix any schema mismatches, deploy affected functions.

  - title: "Verify all RPC functions referenced by edge functions exist"
    parallel_group: 10
    completed: false
    description: |
